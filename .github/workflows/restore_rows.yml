name: タスク2 過去データ復旧（ワンオフ）

on:
  workflow_dispatch:

jobs:
  restore-rows:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install openpyxl google-auth google-api-python-client

      - name: Run restore script
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python restore_rows_ga.py
