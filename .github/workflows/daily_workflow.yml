name: タスク2 売上管理表 自動更新
on:
  schedule:
    # 毎日 JST 11:00 = UTC 02:00
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  daily-workflow:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run daily workflow
        env:
          CPASS_EMAIL: ${{ secrets.CPASS_EMAIL }}
          CPASS_PASSWORD: ${{ secrets.CPASS_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python daily_workflow_ga.py

      - name: Commit run count
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add run_count_task2.txt || true
          git diff --staged --quiet || git commit -m "Update run count task2"
          git push || true
